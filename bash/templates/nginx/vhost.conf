# FreeCP — Client vHost: {{DOMAIN}}

# www → non-www redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.{{DOMAIN}};
    return 301 $scheme://{{DOMAIN}}$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    access_log /opt/freecp/clients/{{DOMAIN}}/logs/access.log;
    error_log  /opt/freecp/clients/{{DOMAIN}}/logs/error.log warn;

    location / {
        proxy_pass         http://{{CONTAINER_NAME}}:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        proxy_pass   http://{{CONTAINER_NAME}}:80;
        expires      30d;
        add_header   Cache-Control "public, immutable";
        access_log   off;
    }

    location = /health {
        proxy_pass http://{{CONTAINER_NAME}}:80/health;
        access_log off;
    }
}

