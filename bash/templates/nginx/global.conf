# ============================================================
#  FreeCP — Global Nginx Configuration
# ============================================================

# FastCGI cache zone
fastcgi_cache_path /tmp/nginx_fcgi_cache
    levels=1:2
    keys_zone=FREECP_CACHE:100m
    max_size=10g
    inactive=60m
    use_temp_path=off;

fastcgi_cache_key     "$scheme$request_method$host$request_uri";
fastcgi_cache_bypass  $http_cookie;
fastcgi_no_cache      $http_cookie;
fastcgi_cache_methods GET HEAD;
fastcgi_cache_valid   200 301 302 10m;
fastcgi_cache_valid   404 1m;
fastcgi_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
fastcgi_cache_lock    on;

# Gzip
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_proxied any;
gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/woff2;

# Security headers
add_header X-Frame-Options       "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff"   always;
add_header X-XSS-Protection      "1; mode=block" always;

# Timeouts
client_max_body_size    100m;
client_body_timeout     60s;
keepalive_timeout       65s;
fastcgi_read_timeout    300s;