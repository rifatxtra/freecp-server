<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Suspended — {{DOMAIN}}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap {
        text-align: center;
        padding: 40px 20px;
        max-width: 480px;
      }
      .icon {
        font-size: 52px;
        margin-bottom: 20px;
      }
      .badge {
        display: inline-block;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 5px 16px;
        font-size: 11px;
        color: #e05252;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 26px;
        color: #fff;
        margin-bottom: 10px;
      }
      p {
        font-size: 15px;
        color: #777;
        line-height: 1.6;
      }
      .domain {
        font-size: 12px;
        color: #333;
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid #1e1e1e;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon">🔒</div>
      <div class="badge">Account Suspended</div>
      <h1>This site is unavailable</h1>
      <p>
        This account has been suspended.<br />
        If you are the site owner, please contact support.
      </p>
      <div class="domain">{{DOMAIN}}</div>
    </div>
  </body>
</html>
